<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #060913 0%, #0b071e 100%);
            --surface: rgba(18, 24, 40, 0.7);
            --surface-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f1f5f9;
            --text-secondary: #64748b;
            
            /* High-Vibrancy Accent Colors */
            --accent-neon: #10b981;       
            --accent-cyan: #06b6d4;       
            --accent-pink: #f43f5e;       
            --accent-purple: #8b5cf6;     
            
            --radius-corner: 20px;
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            --transition-smooth: all 0.45s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Blueprint Art Pillars with Touch/Hover Interactive Reactive Glows */
        .ambient-flank {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 380px;
            pointer-events: auto;
            z-index: 1;
        }

        .ambient-flank-left { left: 0; }
        .ambient-flank-right { right: 0; }

        .blueprint-group {
            position: absolute;
            opacity: 0.15;
            filter: drop-shadow(0 0 4px rgba(6, 182, 212, 0));
            transition: transform 0.15s ease-out, opacity 0.35s ease, filter 0.35s ease;
            will-change: transform, filter, opacity;
            cursor: pointer;
        }

        /* Interactive High-Detail Target Glow Transformation */
        .blueprint-group:hover {
            opacity: 0.9 !important;
            filter: drop-shadow(0 0 12px var(--accent-cyan)) drop-shadow(0 0 25px var(--accent-purple));
        }
        
        .blueprint-group:hover svg { stroke: #ffffff !important; }
        .blueprint-group:hover .bp-measure-text { fill: var(--accent-cyan) !important; opacity: 1 !important; }

        /* Left Side Layout Elements Configuration */
        .bp-clock { top: 4vh; left: 30px; }
        .bp-pc-monitor { top: 32vh; left: 15px; }
        .bp-pencil { top: 58vh; left: 60px; }
        .bp-scale { top: 78vh; left: 30px; }
        
        /* Right Side Layout Elements Configuration */
        .bp-compass-r { top: 4vh; right: 40px; }
        .bp-books-stack { top: 30vh; right: 20px; }
        .bp-caliper-r { top: 56vh; right: 50px; }
        .bp-tsquare-r { top: 78vh; right: 45px; }

        /* Blueprint Schema Stylings */
        .ambient-flank svg {
            stroke: var(--accent-cyan);
            fill: none;
            stroke-width: 1.1;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s ease;
        }
        .ambient-flank .dash-line { stroke-dasharray: 4, 4; stroke: var(--accent-purple); }
        .ambient-flank .fine-grid { stroke: rgba(6, 182, 212, 0.25); stroke-width: 0.6; stroke-dasharray: 2, 6; }
        .ambient-flank .glow-core { stroke: #fff; stroke-width: 1.6; filter: drop-shadow(0 0 4px var(--accent-cyan)); }
        .ambient-flank .bp-axis { stroke: rgba(244, 63, 94, 0.4); stroke-width: 0.8; stroke-dasharray: 8, 4, 2, 4; }
        .ambient-flank .bp-measure-text { fill: var(--accent-purple); font-family: monospace; font-size: 9px; font-weight: bold; opacity: 0.5; transition: all 0.3s ease; }

        /* Page Layout Control Switches */
        .app-view-panel {
            display: none;
            width: 100%;
            max-width: 420px;
            margin: 40px 20px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--surface-border);
            padding: 40px;
            border-radius: var(--radius-corner);
            box-shadow: var(--glass-shadow);
            z-index: 5;
            box-sizing: border-box;
        }

        #planner-panel {
            max-width: 900px;
            padding: 45px;
        }

        .panel-active {
            display: block;
            animation: paneEntrance 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes paneEntrance {
            from { opacity: 0; transform: translateY(25px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h2 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(to right, #38bdf8, #a78bfa, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
        }

        #planner-panel h2 {
            font-size: 32px;
            margin-bottom: 40px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .full-row { grid-column: span 2; }

        .input-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        input[type="text"],
        input[type="number"],
        input[type="password"],
        textarea {
            width: 100%;
            background: rgba(10, 15, 30, 0.75);
            border: 1px solid var(--surface-border);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: var(--transition-smooth);
            font-family: inherit;
            box-sizing: border-box;
        }

        #login-panel input[type="password"],
        #login-panel input[type="text"] {
            padding-right: 55px;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
            background: rgba(10, 15, 30, 0.9);
        }

        textarea {
            resize: vertical;
            min-height: 85px;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            padding: 0;
            user-select: none;
            transition: color 0.2s ease;
            z-index: 6;
        }
        .password-toggle:hover { color: var(--accent-cyan); }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .remember-me input[type="checkbox"] {
            accent-color: var(--accent-cyan);
            transform: scale(1.1);
        }

        .forgot-pass {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-pass:hover { color: var(--accent-cyan); text-decoration: underline; }

        .upload-dropzone {
            position: relative;
            background: rgba(10, 15, 30, 0.4);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85px;
            box-sizing: border-box;
        }
        .upload-dropzone:hover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.04);
        }
        .upload-dropzone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .status-text { font-size: 13px; color: var(--text-secondary); pointer-events: none; }

        .pill-wrapper { display: flex; gap: 16px; }
        .pill-card {
            flex: 1;
            position: relative;
            background: rgba(10, 15, 30, 0.4);
            border: 1px solid var(--surface-border);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition-smooth);
        }
        .pill-card input[type="radio"] { display: none; }

        .slide-window-stage {
            position: relative;
            width: 100%;
            overflow: hidden;
            transition: height 0.45s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: height;
        }
        .slide-pane-panel {
            width: 100%;
            box-sizing: border-box;
            transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.35s ease;
            will-change: transform, opacity;
        }
        .slide-pane-panel.position-absolute { position: absolute; top: 0; left: 0; }
        .slide-pane-panel.exit-left { transform: translate3d(-102%, 0, 0); opacity: 0; pointer-events: none; }
        .slide-pane-panel.enter-right { transform: translate3d(102%, 0, 0); opacity: 0; pointer-events: none; }

        .glow-button {
            background: linear-gradient(135deg, var(--accent-purple) 0%, #6d28d9 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.03em;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
            transition: var(--transition-smooth);
        }
        .glow-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.45);
            filter: brightness(1.08);
        }

        .error-banner {
            background: rgba(244, 63, 94, 0.08);
            border-left: 4px solid var(--accent-pink);
            color: #fda4af;
            padding: 14px 20px;
            border-radius: 8px;
            margin-top: 25px;
            font-weight: 500;
            font-size: 14px;
            animation: shakeAlert 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shakeAlert {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .output-scroll-pane {
            margin-top: 30px;
            border-radius: var(--radius-corner);
            overflow: hidden;
            border: 1px solid var(--surface-border);
            opacity: 0;
            display: none;
            transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .output-scroll-pane.reveal-active { display: block; opacity: 1; transform: translateY(0); }

        table { width: 100%; border-collapse: collapse; background: rgba(10, 15, 30, 0.2); }
        th {
            background: rgba(10, 15, 30, 0.6);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.06em;
            padding: 18px 24px;
            text-align: left;
        }
        td { padding: 20px 24px; font-size: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); transition: var(--transition-smooth); }
        .day-group-even { background: rgba(255, 255, 255, 0.01); }
        .day-group-odd { background: rgba(0, 0, 0, 0.1); }
        .day-tag { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        
        tr { transition: opacity 0.4s ease, background-color 0.4s ease; }
        tr.completed td { opacity: 0.25; }
        tr.completed td:nth-child(4) { text-decoration: line-through; }

        .session-trigger {
            background: rgba(16, 185, 129, 0.08);
            color: var(--accent-neon);
            border: 1px solid rgba(16, 185, 129, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-smooth);
        }
        .session-trigger:hover {
            background: var(--accent-neon);
            color: #090d16;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.35);
        }

        .checkbox-align { text-align: center; width: 60px; }
        input[type="checkbox"] {
            accent-color: var(--accent-neon);
            transform: scale(1.2);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        input[type="checkbox"]:hover { transform: scale(1.35); }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            z-index: 999;
            transition: background 0.4s ease, backdrop-filter 0.4s ease;
        }
        #modal-overlay.open-active { display: block; background: rgba(9, 13, 22, 0.85); backdrop-filter: blur(12px); }

        #timer-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -40%) scale(0.92);
            background: #000000; 
            padding: 40px;
            border-radius: var(--radius-corner);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            z-index: 1000;
            width: 320px;
            border: 2px solid #2563eb; 
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
        }
        #timer-modal.open-active { display: block; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .neon-clock { font-size: 34px; font-weight: 800; color: var(--text-primary); margin-top: 15px; margin-bottom: 25px; font-variant-numeric: tabular-nums; }
        .close-btn { background: transparent; color: var(--accent-pink); border: 1px solid rgba(244, 63, 94, 0.25); padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition-smooth); }
        .close-btn:hover { background: rgba(244, 63, 94, 0.08); border-color: var(--accent-pink); }

        @media(max-width: 1300px) { .ambient-flank { display: none; } }
    </style>
</head>
<body>

<div class="ambient-flank ambient-flank-left">
    <div class="blueprint-group bp-clock" data-speed="0.04" data-rot="0">
        <svg width="220" height="220" viewBox="0 0 220 220">
            <line x1="0" y1="110" x2="220" y2="110" class="bp-axis"/>
            <line x1="110" y1="0" x2="110" y2="220" class="bp-axis"/>
            <circle cx="110" cy="110" r="105" class="fine-grid"/>
            <circle cx="110" cy="110" r="90" class="dash-line"/>
            <circle cx="110" cy="110" r="5" class="glow-core"/>
            <line x1="110" y1="110" x2="160" y2="75" class="glow-core"/>
            <text x="120" y="25" class="bp-measure-text">R = 90.00mm</text>
        </svg>
    </div>

    <div class="blueprint-group bp-pc-monitor" data-speed="0.07" data-rot="-4">
        <svg width="240" height="180" viewBox="0 0 240 180">
            <rect x="10" y="10" width="220" height="120" rx="6" class="fine-grid"/>
            <rect x="18" y="18" width="204" height="104" rx="2"/>
            <path d="M 30 35 L 90 35 M 30 50 L 140 50 M 45 65 L 110 65 M 30 80 L 75 80" stroke-width="1.5"/>
            <path d="M 150 35 L 200 85" class="dash-line"/>
            <circle cx="175" cy="60" r="20" class="fine-grid"/>
            <path d="M 100 130 L 90 160 L 150 160 L 140 130 Z" class="glow-core"/>
            <line x1="70" y1="160" x2="170" y2="160" stroke-width="2"/>
            <text x="25" y="120" class="bp-measure-text">DISPLAY W: 2560px</text>
        </svg>
    </div>

    <div class="blueprint-group bp-pencil" data-speed="0.09" data-rot="-12">
        <svg width="180" height="80" viewBox="0 0 180 80">
            <line x1="10" y1="40" x2="170" y2="40" class="fine-grid"/>
            <path d="M 15 40 L 40 20 L 155 20 L 165 40 L 155 60 L 40 60 Z"/>
            <path d="M 155 20 L 155 60" class="glow-core"/>
            <text x="70" y="8" class="bp-measure-text">L = 150.00</text>
        </svg>
    </div>

    <div class="blueprint-group bp-scale" data-speed="0.06" data-rot="5">
        <svg width="240" height="70" viewBox="0 0 240 70">
            <rect x="10" y="20" width="220" height="30" rx="1"/>
            <line x1="10" y1="35" x2="230" y2="35" class="dash-line"/>
            <path d="M 20 20 L 20 30 M 60 20 L 60 30 M 100 20 L 100 30 M 140 20 L 140 30 M 180 20 L 180 30 M 220 20 L 220 30" stroke-width="0.8"/>
            <text x="100" y="62" class="bp-measure-text">SCALE 1:1 METRIC</text>
        </svg>
    </div>
</div>

<div class="ambient-flank ambient-flank-right">
    <div class="blueprint-group bp-compass-r" data-speed="0.05" data-rot="-6">
        <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="140" r="55" class="fine-grid"/>
            <path d="M 45 140 A 55 55 0 0 1 155 140" class="dash-line"/>
            <circle cx="100" cy="80" r="8" class="glow-core"/>
            <text x="120" y="35" class="bp-measure-text">ARC DEG: 60°</text>
        </svg>
    </div>

    <div class="blueprint-group bp-books-stack" data-speed="0.11" data-rot="8">
        <svg width="240" height="170" viewBox="0 0 240 170">
            <rect x="40" y="110" width="160" height="35" rx="3"/>
            <rect x="50" y="70" width="140" height="40" rx="3"/>
            <g transform="rotate(-6, 90, 60)">
                <rect x="60" y="35" width="125" height="35" rx="2"/>
            </g>
            <text x="45" y="160" class="bp-measure-text">BIBLIOGRAPHY STACK [N=3]</text>
        </svg>
    </div>

    <div class="blueprint-group bp-caliper-r" data-speed="0.1" data-rot="10">
        <svg width="220" height="110" viewBox="0 0 220 110">
            <rect x="10" y="30" width="200" height="20" rx="1"/>
            <path d="M 20 30 L 20 80 L 35 50" class="glow-core"/>
            <text x="135" y="20" class="bp-measure-text">TOLERANCE ±0.02</text>
        </svg>
    </div>

    <div class="blueprint-group bp-tsquare-r" data-speed="0.13" data-rot="-15">
        <svg width="200" height="140" viewBox="0 0 200 140">
            <rect x="20" y="10" width="20" height="110" rx="1" class="glow-core"/>
            <rect x="40" y="50" width="150" height="25" rx="1"/>
            <path d="M 50 50 L 50 56 M 80 50 L 80 56 M 110 50 L 110 56 M 140 50 L 140 56" stroke-width="0.8"/>
            <text x="60" y="90" class="bp-measure-text">T-SQ ACCURACY ±0.01</text>
        </svg>
    </div>
</div>

<div id="login-panel" class="app-view-panel panel-active">
    <h2>LOGIN</h2>
    <div class="subtitle">Log in to your study planning dashboard</div>
    
    <form id="login-form">
        <div class="input-block">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>
        </div>
        
        <div class="input-block">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                <button type="button" class="password-toggle" id="toggle-text">SHOW</button>
            </div>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox" id="remember"> Remember Data
            </label>
            <a href="#" class="forgot-pass" id="forgot-pass-link">Forgot Password?</a>
        </div>
        
        <button type="submit" class="glow-button">LET'S GO </button>
    </form>
    
    <div id="login-error" class="error-banner" style="display: none;"></div>
</div>

<div id="planner-panel" class="app-view-panel">
    <h2>⚡ Study Dashboard ⚡</h2>
    
    <div class="grid-layout">
        <div class="input-block">
            <label for="subject">Subject Name:</label>
            <input type="text" id="subject" placeholder="e.g. Quantum Physics, History...">
        </div>
        
        <div class="input-block">
            <label>Upload Materials (.txt, .pdf, .docx):</label>
            <div class="upload-dropzone">
                <input type="file" id="topics-file" accept=".txt,.pdf,.docx">
                <div id="file-status" class="status-text">Drop book layout files or type manually below</div>
            </div>
        </div>

        <div class="input-block full-row">
            <label for="manual-text-entry">Paste Study Material / Syllabus (Optional Override):</label>
            <textarea id="manual-text-entry" placeholder="Paste raw lecture paragraphs or syllabus tracks directly here..."></textarea>
        </div>
        
        <div class="input-block">
            <label for="days">Days Available:</label>
            <input type="number" id="days" min="1" value="5">
        </div>
        
        <div class="input-block">
            <label for="hours">Hours Available (per day):</label>
            <input type="number" id="hours" min="1" value="4">
        </div>

        <div class="input-block full-row">
            <label>Choose Your Timer Interval:</label>
            <div class="pill-wrapper">
                <label class="pill-card" id="card-custom">
                    <input type="radio" name="duration-mode" id="mode-custom" value="custom" checked>
                    Manual Time Interval
                </label>
                <label class="pill-card" id="card-calc">
                    <input type="radio" name="duration-mode" id="mode-calc" value="calculated">
                    Automatic Time Interval
                </label>
            </div>
        </div>

        <div class="full-row slide-window-stage" id="slider-stage">
            <div class="input-block slide-pane-panel" id="panel-manual-input">
                <label for="custom-minutes">Enter Your Duration (Minutes):</label>
                <input type="number" id="custom-minutes" min="1" value="45">
            </div>
            <div class="input-block slide-pane-panel position-absolute enter-right" id="panel-auto-status" style="background: rgba(10, 15, 30, 0.35); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03);">
                <label style="color: var(--accent-cyan);">Calculated Split Distribution</label>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">The layout algorithm will adaptively partition session lengths evenly across your parsed modules.</div>
            </div>
        </div>
    </div>
    
    <button class="glow-button" id="btn-generate-table">Generate Your Table</button>
    
    <div id="error-message" style="display:none;" class="error-banner"></div>
    <div id="table-output" class="output-scroll-pane"></div>
</div>

<div id="modal-overlay"></div>
<div id="timer-modal">
    <h3 id="timer-topic-title" style="margin-bottom:15px; font-size:12px; color:var(--text-secondary); text-transform:uppercase;">Current Run</h3>
    <canvas id="timer-canvas" width="220" height="220"></canvas>
    <div class="neon-clock" id="digital-fallback">00:00:00</div>
    <button class="close-btn" id="btn-pause-session">Pause Session</button>
</div>

<script>
// Configure PDF.js Worker path explicitly to correct parsing breaks
if (typeof window !== 'undefined' && 'pdfjsLib' in window) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
}

let countdownInterval = null;
let targetEndTime = 0; 
let currentActiveTopic = "";
let uploadedTopicsList = [];

let targetMouseX = 0, targetMouseY = 0;
let currentMouseX = 0, currentMouseY = 0;

window.addEventListener('DOMContentLoaded', () => {
    if ("Notification" in window) Notification.requestPermission();
    
    // Bind UI Event Listeners cleanly to bypass element global scope block
    document.getElementById('login-form').addEventListener('submit', handleLogin);
    document.getElementById('toggle-text').addEventListener('click', togglePasswordVisibility);
    document.getElementById('forgot-pass-link').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Verification handle link deployed.');
    });
    
    document.getElementById('mode-custom').addEventListener('change', toggleDurationInputs);
    document.getElementById('mode-calc').addEventListener('change', toggleDurationInputs);
    document.getElementById('manual-text-entry').addEventListener('input', handleManualTextChange);
    document.getElementById('topics-file').addEventListener('change', handleFileLoad);
    
    document.getElementById('subject').addEventListener('input', autoRegenerateIfDataExists);
    document.getElementById('days').addEventListener('input', autoRegenerateIfDataExists);
    document.getElementById('hours').addEventListener('input', autoRegenerateIfDataExists);
    document.getElementById('custom-minutes').addEventListener('input', autoRegenerateIfDataExists);
    
    document.getElementById('btn-generate-table').addEventListener('click', generateSchedule);
    document.getElementById('modal-overlay').addEventListener('click', closeTimer);
    document.getElementById('btn-pause-session').addEventListener('click', closeTimer);

    toggleDurationInputs();
    loadPlannerState(); 
    
    document.addEventListener('mousemove', (e) => {
        targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
        targetMouseY = (e.clientY / window.innerHeight) * 2 - 1;
    });
    runPhysicsLoop();
});

// Ambient Blueprint Floating Physics Logic
function runPhysicsLoop() {
    currentMouseX += (targetMouseX - currentMouseX) * 0.07;
    currentMouseY += (targetMouseY - currentMouseY) * 0.07;
    
    const scrollY = window.scrollY;
    document.querySelectorAll('.blueprint-group').forEach((elem, index) => {
        const speed = parseFloat(elem.getAttribute('data-speed')) || 0.1;
        const baseRot = parseFloat(elem.getAttribute('data-rot')) || 0;
        
        const oscillator = Math.sin((Date.now() * 0.001) + index) * 5;
        const posX = (currentMouseX * -40 * speed) + oscillator;
        const posY = (currentMouseY * -40 * speed) - (scrollY * speed * 0.3);
        
        elem.style.transform = `translate3d(${posX}px, ${posY}px, 0) rotate(${baseRot}deg)`;
    });
    requestAnimationFrame(runPhysicsLoop);
}

// Security Panel Access Routine Switches
function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleText = document.getElementById('toggle-text');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleText.innerText = 'HIDE';
    } else {
        passwordInput.type = 'password';
        toggleText.innerText = 'SHOW';
    }
}

function handleLogin(event) {
    event.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    
    if(!user || pass.length < 6) {
        err.innerText = "Authentication failure: Credentials invalid.";
        err.style.display = "block";
        return;
    }
    
    // Smooth interface panels conversion sequence
    document.getElementById('login-panel').classList.remove('panel-active');
    setTimeout(() => {
        document.getElementById('planner-panel').classList.add('panel-active');
        toggleDurationInputs();
    }, 400);
}

// Input Panel Sliding Window Transitions
function toggleDurationInputs() {
    const isCustomMode = document.getElementById('mode-custom').checked;
    const stage = document.getElementById('slider-stage');
    const manualPanel = document.getElementById('panel-manual-input');
    const autoPanel = document.getElementById('panel-auto-status');
    const cardCustom = document.getElementById('card-custom');
    const cardCalc = document.getElementById('card-calc');

    if (isCustomMode) {
        manualPanel.classList.remove('exit-left');
        autoPanel.classList.add('enter-right');
        autoPanel.classList.add('position-absolute');
        manualPanel.classList.remove('position-absolute');
        stage.style.height = `${manualPanel.offsetHeight}px`;
        
        cardCustom.style.borderColor = "var(--accent-cyan)";
        cardCustom.style.background = "rgba(6, 182, 212, 0.08)";
        cardCustom.style.color = "var(--accent-cyan)";
        cardCalc.style.borderColor = "var(--surface-border)";
        cardCalc.style.background = "rgba(10, 15, 30, 0.4)";
        cardCalc.style.color = "var(--text-primary)";
    } else {
        manualPanel.classList.add('exit-left');
        autoPanel.classList.remove('enter-right');
        manualPanel.classList.add('position-absolute');
        autoPanel.classList.remove('position-absolute');
        stage.style.height = `${autoPanel.offsetHeight}px`;
        
        cardCalc.style.borderColor = "var(--accent-cyan)";
        cardCalc.style.background = "rgba(6, 182, 212, 0.08)";
        cardCalc.style.color = "var(--accent-cyan)";
        cardCustom.style.borderColor = "var(--surface-border)";
        cardCustom.style.background = "rgba(10, 15, 30, 0.4)";
        cardCustom.style.color = "var(--text-primary)";
    }
    autoRegenerateIfDataExists();
}

function handleManualTextChange() {
    const textData = document.getElementById('manual-text-entry').value;
    if(textData.trim().length > 5) {
        uploadedTopicsList = processRawTextIntoStudyBlocks(textData);
        document.getElementById('file-status').innerText = `✍️ Parsed ${uploadedTopicsList.length} study segments from input text.`;
        generateSchedule();
    } else {
        uploadedTopicsList = [];
        document.getElementById('file-status').innerText = "Drop book layout files or type manually below";
        hideSchedule();
    }
}

async function handleFileLoad() {
    const fileInput = document.getElementById('topics-file');
    const statusDiv = document.getElementById('file-status');
    if (!fileInput.files.length) return;

    const file = fileInput.files[0];
    const fileExt = file.name.split('.').pop().toLowerCase();
    statusDiv.style.color = "var(--accent-cyan)";
    statusDiv.innerText = "Analyzing text architecture profiles...";

    try {
        let rawContentText = "";
        if (fileExt === 'pdf') {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            for (let p = 1; p <= pdf.numPages; p++) {
                const page = await pdf.getPage(p);
                const textContent = await page.getTextContent();
                rawContentText += textContent.items.map(item => item.str).join(' ') + "\n";
            }
        } else if (fileExt === 'docx') {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
            rawContentText = result.value || "";
        } else {
            rawContentText = await file.text();
        }

        document.getElementById('manual-text-entry').value = rawContentText;
        uploadedTopicsList = processRawTextIntoStudyBlocks(rawContentText);
        statusDiv.style.color = "var(--accent-neon)";
        statusDiv.innerText = `✨ Successfully segmented ${uploadedTopicsList.length} blocks from file.`;
        generateSchedule();
    } catch (err) {
        console.error(err);
        statusDiv.style.color = "var(--accent-pink)";
        statusDiv.innerText = "Error: Text formatting profiles unreadable.";
    }
}

// Custom text chunk parser
function processRawTextIntoStudyBlocks(text) {
    if(!text) return [];
    let lines = text.split(/[.;?\n]+/).map(p => p.trim()).filter(p => p.length > 20);
    return lines.slice(0, 35);
}

function autoRegenerateIfDataExists() {
    if (uploadedTopicsList.length > 0) generateSchedule();
}

function hideSchedule() {
    const outputDiv = document.getElementById('table-output');
    outputDiv.classList.remove('reveal-active');
    setTimeout(() => { outputDiv.style.display = 'none'; }, 500);
}

// Schedule Generator & Persistent Tracking Loop Matrix
function generateSchedule() {
    const subject = document.getElementById('subject').value.trim() || "General Study Domain";
    const daysInput = document.getElementById('days').value;
    const hoursInput = document.getElementById('hours').value;
    const errorDiv = document.getElementById('error-message');
    const outputDiv = document.getElementById('table-output');

    errorDiv.style.display = 'none';
    if (uploadedTopicsList.length === 0) {
        errorDiv.innerText = "Please upload a file or paste text in the box above first.";
        errorDiv.style.display = 'block';
        hideSchedule();
        return;
    }

    const days = parseInt(daysInput) || 1;
    const hoursPerDay = parseInt(hoursInput) || 1;
    let currentWorkingList = [...uploadedTopicsList];

    let minutesPerTopic = 45;
    if (document.getElementById('mode-calc').checked) {
        minutesPerTopic = Math.round(((days * hoursPerDay) * 60) / currentWorkingList.length);
    } else {
        minutesPerTopic = parseFloat(document.getElementById('custom-minutes').value) || 45;
    }

    let tableHtml = `<table><thead><tr><th class="checkbox-align">State</th><th>Timeline</th><th>Domain</th><th>Task Block Item</th><th>Control</th></tr></thead><tbody>`;
    
    let baseCount = Math.floor(currentWorkingList.length / days);
    let remainder = currentWorkingList.length % days;
    let trackIdx = 0;

    for (let day = 1; day <= days; day++) {
        let assignedCount = baseCount + (remainder > 0 ? 1 : 0);
        remainder--;
        let rowColorClass = day % 2 === 0 ? 'day-group-even' : 'day-group-odd';

        for (let i = 0; i < assignedCount; i++) {
            if (trackIdx < currentWorkingList.length) {
                let unescapedString = currentWorkingList[trackIdx].replace(/"/g, '&quot;');
                let bulletTopicClean = unescapedString.replace(/['"']/g, "").replace(/\n/g, " ");

                tableHtml += `
                    <tr class="${rowColorClass}" id="task-row-${trackIdx}">
                        <td class="checkbox-align">
                            <input type="checkbox" id="check-${trackIdx}">
                        </td>
                        <td><span class="day-tag">DAY ${day}</span></td>
                        <td style="color: var(--text-secondary); font-size:13px;">${subject}</td>
                        <td style="font-weight:600; max-width:400px; word-wrap:break-word;">${unescapedString}</td>
                        <td>
                            <button class="session-trigger" data-topic="${bulletTopicClean}" data-mins="${minutesPerTopic}">
                                Engage
                            </button>
                        </td>
                    </tr>`;
                trackIdx++;
            }
        }
    }

    tableHtml += `</tbody></table>`;
    outputDiv.innerHTML = tableHtml;
    outputDiv.style.display = 'block';
    
    // Bind dynamic event listeners inside generated elements cleanly
    outputDiv.querySelectorAll('input[type="checkbox"]').forEach(box => {
        box.addEventListener('change', (e) => {
            const idx = e.target.id.split('-')[1];
            toggleTaskState(idx);
        });
    });

    outputDiv.querySelectorAll('.session-trigger').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const topic = e.target.getAttribute('data-topic');
            const mins = parseFloat(e.target.getAttribute('data-mins'));
            startAnalogTimer(topic, mins);
        });
    });
    
    setTimeout(() => { outputDiv.classList.add('reveal-active'); }, 50);
    savePlannerState();
}

// LocalStorage Engine States Sync Operations
function toggleTaskState(idx) {
    const row = document.getElementById(`task-row-${idx}`);
    const checkbox = document.getElementById(`check-${idx}`);
    if(checkbox.checked) {
        row.classList.add('completed');
    } else {
        row.classList.remove('completed');
    }
    
    let completionMap = JSON.parse(localStorage.getItem('study_completion_map') || "{}");
    completionMap[idx] = checkbox.checked;
    localStorage.setItem('study_completion_map', JSON.stringify(completionMap));
}

function savePlannerState() {
    localStorage.setItem('study_subject', document.getElementById('subject').value);
    localStorage.setItem('study_days', document.getElementById('days').value);
    localStorage.setItem('study_hours', document.getElementById('hours').value);
    localStorage.setItem('study_custom_min', document.getElementById('custom-minutes').value);
    localStorage.setItem('study_raw_text', document.getElementById('manual-text-entry').value);
    localStorage.setItem('study_topics_list', JSON.stringify(uploadedTopicsList));
}

function loadPlannerState() {
    if(!localStorage.getItem('study_topics_list')) return;
    
    document.getElementById('subject').value = localStorage.getItem('study_subject') || "";
    document.getElementById('days').value = localStorage.getItem('study_days') || "5";
    document.getElementById('hours').value = localStorage.getItem('study_hours') || "4";
    document.getElementById('custom-minutes').value = localStorage.getItem('study_custom_min') || "45";
    document.getElementById('manual-text-entry').value = localStorage.getItem('study_raw_text') || "";
    
    uploadedTopicsList = JSON.parse(localStorage.getItem('study_topics_list') || "[]");
    
    if(uploadedTopicsList.length > 0) {
        generateSchedule();
        
        // Restore row completion checkmarks
        let completionMap = JSON.parse(localStorage.getItem('study_completion_map') || "{}");
        Object.keys(completionMap).forEach(idx => {
            const checkbox = document.getElementById(`check-${idx}`);
            const row = document.getElementById(`task-row-${idx}`);
            if(checkbox && completionMap[idx]) {
                checkbox.checked = true;
                row.classList.add('completed');
            }
        });
    }
}

// Analog Circular Canvas Timer System Loop Profiles
function startAnalogTimer(topicName, durationMinutes) {
    if (countdownInterval) clearInterval(countdownInterval);
    currentActiveTopic = topicName;
    document.getElementById('timer-topic-title').innerText = topicName;
    
    const overlay = document.getElementById('modal-overlay');
    const modal = document.getElementById('timer-modal');
    
    overlay.style.display = 'block';
    modal.style.display = 'block';

    setTimeout(() => {
        overlay.classList.add('open-active');
        modal.classList.add('open-active');
    }, 20);

    targetEndTime = Date.now() + (durationMinutes * 60 * 1000);
    runTimerTick();
    countdownInterval = setInterval(runTimerTick, 250); 
}

function runTimerTick() {
    const now = Date.now();
    const secondsRemaining = Math.max(0, Math.ceil((targetEndTime - now) / 1000));

    if (secondsRemaining <= 0) {
        clearInterval(countdownInterval);
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("⏱️ Interval Exhausted", { body: `Session frame over for: ${currentActiveTopic}` });
        } else {
            alert(`Session frame over for: ${currentActiveTopic}`);
        }
        closeTimer();
        return;
    }
    
    let hours = Math.floor(secondsRemaining / 3600);
    let minutes = Math.floor((secondsRemaining % 3600) / 60);
    let seconds = secondsRemaining % 60;

    document.getElementById('digital-fallback').innerText = 
        `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

    const canvas = document.getElementById('timer-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const radius = canvas.width / 2;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(radius, radius);
    
    ctx.beginPath();
    ctx.arc(0, 0, radius - 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#000000';
    ctx.fill();
    
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#2563eb'; 
    ctx.stroke();

    ctx.fillStyle = '#ffffff';
    for (let i = 0; i < 60; i++) {
        ctx.save();
        ctx.rotate(i * Math.PI / 30);
        if (i % 5 === 0) {
            ctx.fillRect(-1.5, -radius + 15, 3, 8);
        } else {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(-0.75, -radius + 12, 1.5, 4);
        }
        ctx.restore();
    }

    ctx.save();
    let hrAngle = ((hours % 12) * Math.PI / 6) + (minutes * Math.PI / 360);
    ctx.rotate(hrAngle);
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(0, -radius * 0.5);
    ctx.lineWidth = 5; ctx.strokeStyle = '#ef4444'; ctx.lineCap = "round"; ctx.stroke();
    ctx.restore();

    ctx.save();
    let minAngle = (minutes * Math.PI / 30) + (seconds * Math.PI / 1800);
    ctx.rotate(minAngle);
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(0, -radius * 0.7);
    ctx.lineWidth = 4; ctx.strokeStyle = '#22c55e'; ctx.lineCap = "round"; ctx.stroke();
    ctx.restore();

    ctx.save();
    let secAngle = (seconds * Math.PI / 30);
    ctx.rotate(secAngle);
    ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(0, -radius * 0.82);
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#3b82f6'; ctx.lineCap = "round"; ctx.stroke();
    ctx.restore();

    ctx.beginPath(); ctx.arc(0, 0, 5, 0, 2 * Math.PI);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.restore();
}

function closeTimer() {
    if (countdownInterval) clearInterval(countdownInterval);
    const overlay = document.getElementById('modal-overlay');
    const modal = document.getElementById('timer-modal');
    modal.classList.remove('open-active');
    overlay.classList.remove('open-active');
    setTimeout(() => {
        modal.style.display = 'none';
        overlay.style.display = 'none';
    }, 450);
}
</script>

</body>
</html>
